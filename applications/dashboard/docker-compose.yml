networks:
  dashboard-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inv_postgres
    restart: unless-stopped
    networks: [dashboard-net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d investment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inv_redis
    restart: unless-stopped
    networks: [dashboard-net]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: inv_backend
    restart: unless-stopped
    networks: [dashboard-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/investment_db
      REDIS_URL: redis://redis:6379/0
      # Allow all origins — browser never calls backend directly (goes through Next.js proxy)
      CORS_ORIGINS: '["*"]'
      LOG_LEVEL: INFO
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app:cached
      - uploads_data:/app/uploads
      - "${INVESTMENT_DATA_PATH:-./data/investmentPlan}:/app/investment_data:ro"
      - "${INVESTMENT_AGENT_PATH:-./data/investmentAgent}:/app/investment_agent:ro"
      - ./docs:/app/docs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: inv_frontend
    restart: unless-stopped
    networks: [dashboard-net]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # BACKEND_URL: internal Docker hostname for the Next.js proxy route handler.
      # Browser never calls the backend directly — it calls /api/proxy/... on the
      # same origin, so this works behind any tunnel without rebuilding.
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"

  # ── Adminer (dev DB UI) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: inv_adminer
    restart: unless-stopped
    networks: [dashboard-net]
    depends_on: [postgres]
    ports:
      - "8080:8080"
    profiles: [dev]
